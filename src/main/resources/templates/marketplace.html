<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Chợ Thẻ Bài')}"></head>
<body>
    <header th:replace="~{layout :: header}"></header>

    <main>
        <h2 style="font-weight: 800; font-size: 2.2rem; margin-bottom: 2rem;"><i class="fa-solid fa-shop"></i> Chợ Thẻ Bài TCG</h2>

        <div style="display: grid; grid-template-columns: 1fr 3fr; gap: 2rem;">
            <!-- Filters Sidebar -->
            <div>
                <div class="glass-card">
                    <h3 style="font-size: 1.2rem; font-weight: 700; margin-bottom: 1rem;"><i class="fa-solid fa-filter"></i> Bộ Lọc</h3>
                    <form th:action="@{/marketplace}" method="get">
                        <div class="form-group">
                            <label class="form-label">Game</label>
                            <select name="gameId" class="form-control">
                                <option value="">Tất cả</option>
                                <option th:each="g : ${games}" th:value="${g.id}" th:text="${g.name}" th:selected="${g.id == selectedGameId}"></option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Tình trạng</label>
                            <select name="condition" class="form-control">
                                <option value="">Tất cả</option>
                                <option value="MINT" th:selected="${selectedCondition?.name() == 'MINT'}">MINT</option>
                                <option value="NEAR_MINT" th:selected="${selectedCondition?.name() == 'NEAR_MINT'}">NEAR MINT</option>
                                <option value="LIGHTLY_PLAYED" th:selected="${selectedCondition?.name() == 'LIGHTLY_PLAYED'}">LIGHTLY PLAYED</option>
                                <option value="MODERATELY_PLAYED" th:selected="${selectedCondition?.name() == 'MODERATELY_PLAYED'}">MODERATELY PLAYED</option>
                                <option value="HEAVILY_PLAYED" th:selected="${selectedCondition?.name() == 'HEAVILY_PLAYED'}">HEAVILY PLAYED</option>
                                <option value="DAMAGED" th:selected="${selectedCondition?.name() == 'DAMAGED'}">DAMAGED</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Giá từ (VND)</label>
                            <input type="number" name="minPrice" th:value="${minPrice}" class="form-control" placeholder="0">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Giá đến (VND)</label>
                            <input type="number" name="maxPrice" th:value="${maxPrice}" class="form-control" placeholder="99,999,999">
                        </div>
                        <button type="submit" class="btn-primary" style="width: 100%; margin-top: 1rem;">Áp dụng</button>
                    </form>
                </div>
            </div>

            <!-- Listings list -->
            <div>
                <div th:if="${listings.isEmpty()}" style="text-align: center; padding: 4rem 0;">
                    <i class="fa-solid fa-store-slash" style="font-size: 4rem; color: var(--text-secondary); margin-bottom: 1rem;"></i>
                    <p style="color: var(--text-secondary); font-size: 1.2rem;">Không tìm thấy tin bán nào hoạt động.</p>
                </div>

                <div class="card-grid" style="margin-top: 0;">
                    <div th:each="l : ${listings}" class="tcg-card">
                        <div class="card-img-wrapper">
                            <img th:src="${l.imageUrls}" alt="Listing image">
                        </div>
                        <div class="card-info">
                            <div>
                                <div style="display: flex; gap: 0.5rem; margin-bottom: 0.5rem;">
                                    <span class="badge badge-nearmint" th:classappend="${l.cardCondition.name() == 'MINT' ? 'badge-mint' : (l.cardCondition.name() == 'NEAR_MINT' ? 'badge-nearmint' : 'badge-played')}" th:text="${l.cardCondition}"></span>
                                    <span class="badge" style="background: rgba(255,255,255,0.05); color: var(--text-secondary);" th:text="${l.card.language}"></span>
                                </div>
                                <a th:href="@{/cards/{id}(id=${l.card.id})}" class="card-name" th:text="${l.card.name}"></a>
                                <div class="card-meta" th:text="'Người bán: ' + ${l.seller.displayName}"></div>
                                <div style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.25rem;" th:text="'Tồn kho: ' + ${l.quantity}"></div>
                            </div>
                            <div class="card-footer" style="margin-top: 1rem;">
                                <span class="card-price" th:text="${#numbers.formatDecimal(l.price, 0, 'COMMA', 0, 'POINT')} + 'đ'"></span>
                                <form th:action="@{/cart/add}" method="post">
                                    <input type="hidden" name="listingId" th:value="${l.id}">
                                    <button type="submit" class="btn-primary" style="padding: 0.4rem 1rem; font-size: 0.85rem;"><i class="fa-solid fa-shopping-cart"></i> Mua</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer th:replace="~{layout :: footer}"></footer>
</body>
</html>
