<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Cảnh Báo Giá')}"></head>
<body>
    <header th:replace="~{layout :: header}"></header>

    <main>
        <h2 style="font-weight: 800; font-size: 2.2rem; margin-bottom: 2rem;"><i class="fa-solid fa-bell"></i> Cảnh Báo Giá Của Bạn</h2>

        <div class="glass-card">
            <div th:if="${alerts.isEmpty()}" style="text-align: center; padding: 3rem 0; color: var(--text-secondary);">
                Bạn chưa đặt bất kỳ cảnh báo giá nào. Hãy tìm thẻ bài và bật cảnh báo khi giá giảm!
            </div>

            <table th:if="${!alerts.isEmpty()}">
                <thead>
                    <tr>
                        <th>Thẻ bài</th>
                        <th>Ngưỡng giá lọc</th>
                        <th>Tình trạng lọc</th>
                        <th>Trạng thái</th>
                        <th>Hành động</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="a : ${alerts}">
                        <td>
                            <div style="display: flex; gap: 0.75rem; align-items: center;">
                                <img th:src="${a.card.imageUrl}" style="width: 35px; border-radius: 4px;">
                                <div>
                                    <a th:href="@{/cards/{id}(id=${a.card.id})}" style="font-weight: 600;" th:text="${a.card.name}"></a>
                                    <div style="font-size: 0.8rem; color: var(--text-secondary);" th:text="${a.card.cardSet.name}"></div>
                                </div>
                            </div>
                        </td>
                        <td style="font-weight: 700; color: var(--accent-orange);" th:text="${#numbers.formatDecimal(a.targetPrice, 0, 'COMMA', 0, 'POINT')} + 'đ'"></td>
                        <td th:text="${a.conditionFilter != null ? a.conditionFilter : 'Tất cả'}"></td>
                        <td>
                            <span class="badge" th:classappend="${a.status.name() == 'ACTIVE' ? 'badge-nearmint' : (a.status.name() == 'TRIGGERED' ? 'badge-mint' : 'badge-played')}" th:text="${a.status}"></span>
                        </td>
                        <td>
                            <form th:if="${a.status.name() == 'ACTIVE'}" th:action="@{/alerts/disable/{id}(id=${a.id})}" method="post" style="display:inline-block;">
                                <button type="submit" class="btn-secondary" style="padding: 0.25rem 0.5rem;"><i class="fa-solid fa-bell-slash"></i> Tắt</button>
                            </form>
                            <form th:action="@{/alerts/delete/{id}(id=${a.id})}" method="post" style="display:inline-block; margin-left: 0.25rem;">
                                <button type="submit" class="btn-secondary" style="padding: 0.25rem 0.5rem; color: var(--accent-red); border-color: rgba(239, 68, 68, 0.2);"><i class="fa-solid fa-trash"></i></button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <footer th:replace="~{layout :: footer}"></footer>
</body>
</html>
