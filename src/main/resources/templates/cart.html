<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Giỏ Hàng')}"></head>
<body>
    <header th:replace="~{layout :: header}"></header>

    <main>
        <h2 style="font-weight: 800; font-size: 2.2rem; margin-bottom: 2rem;"><i class="fa-solid fa-shopping-cart"></i> Giỏ Hàng Của Bạn</h2>

        <div th:if="${groupedCart.isEmpty()}" style="text-align: center; padding: 4rem 0;">
            <i class="fa-solid fa-cart-flatbed-suitcase" style="font-size: 4rem; color: var(--text-secondary); margin-bottom: 1rem;"></i>
            <p style="color: var(--text-secondary); font-size: 1.2rem; margin-bottom: 1.5rem;">Giỏ hàng của bạn đang trống.</p>
            <a th:href="@{/marketplace}" class="btn-primary">Đi chợ ngay</a>
        </div>

        <div th:if="${!groupedCart.isEmpty()}" style="display: grid; grid-template-columns: 3fr 1fr; gap: 2rem;">
            <!-- Cart Items grouped by seller -->
            <div>
                <div th:each="sellerEntry : ${groupedCart.entrySet()}" class="glass-card" style="margin-bottom: 1.5rem;">
                    <div style="border-bottom: 1px solid var(--border-color); padding-bottom: 0.75rem; margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center;">
                        <h3 style="font-size: 1.15rem; font-weight: 700; color: var(--accent-purple);">
                            <i class="fa-solid fa-store"></i> <span th:text="${sellerEntry.key.displayName}"></span>
                        </h3>
                        <span style="font-size: 0.85rem; color: var(--text-secondary);" th:text="${sellerEntry.key.address}"></span>
                    </div>

                    <table>
                        <thead>
                            <tr>
                                <th>Thẻ bài</th>
                                <th>Tình trạng</th>
                                <th>Đơn giá</th>
                                <th>Số lượng</th>
                                <th>Thành tiền</th>
                                <th>Xóa</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="item : ${sellerEntry.value}">
                                <td>
                                    <div style="display: flex; gap: 1rem; align-items: center;">
                                        <img th:src="${item.listing.imageUrls}" style="width: 40px; border-radius: 4px;">
                                        <div>
                                            <a th:href="@{/cards/{id}(id=${item.listing.card.id})}" style="font-weight:600;" th:text="${item.listing.card.name}"></a>
                                            <div style="font-size:0.8rem; color: var(--text-secondary);" th:text="${item.listing.card.cardSet.name}"></div>
                                        </div>
                                    </div>
                                </td>
                                <td>
                                    <span class="badge badge-nearmint" th:classappend="${item.listing.cardCondition.name() == 'MINT' ? 'badge-mint' : (item.listing.cardCondition.name() == 'NEAR_MINT' ? 'badge-nearmint' : 'badge-played')}" th:text="${item.listing.cardCondition}"></span>
                                </td>
                                <td th:text="${#numbers.formatDecimal(item.listing.price, 0, 'COMMA', 0, 'POINT')} + 'đ'"></td>
                                <td>
                                    <form th:action="@{/cart/update}" method="post" style="display: flex; gap: 0.25rem; align-items: center;">
                                        <input type="hidden" name="listingId" th:value="${item.listing.id}">
                                        <input type="number" name="quantity" th:value="${item.quantity}" min="1" th:max="${item.listing.quantity}" class="form-control" style="width: 60px; padding: 0.25rem; text-align: center;">
                                        <button type="submit" class="btn-secondary" style="padding: 0.25rem 0.5rem;"><i class="fa-solid fa-sync"></i></button>
                                    </form>
                                </td>
                                <td style="font-weight: 700;" th:text="${#numbers.formatDecimal(item.subtotal, 0, 'COMMA', 0, 'POINT')} + 'đ'"></td>
                                <td>
                                    <form th:action="@{/cart/remove}" method="post">
                                        <input type="hidden" name="listingId" th:value="${item.listing.id}">
                                        <button type="submit" style="background: none; border: none; color: var(--accent-red); cursor: pointer;"><i class="fa-solid fa-trash"></i></button>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Summary Panel -->
            <div>
                <div class="glass-card">
                    <h3 style="font-size: 1.2rem; font-weight: 700; margin-bottom: 1.5rem;">Tổng quan đơn hàng</h3>
                    
                    <div style="display: flex; justify-content: space-between; margin-bottom: 0.75rem;">
                        <span style="color: var(--text-secondary);">Tạm tính:</span>
                        <span style="font-weight: 600;" th:text="${#numbers.formatDecimal(cartTotal, 0, 'COMMA', 0, 'POINT')} + 'đ'"></span>
                    </div>
                    <div style="display: flex; justify-content: space-between; margin-bottom: 0.75rem;">
                        <span style="color: var(--text-secondary);">Phí nền tảng (5%):</span>
                        <span style="font-weight: 600;" th:text="${#numbers.formatDecimal(cartTotal * 0.05, 0, 'COMMA', 0, 'POINT')} + 'đ'"></span>
                    </div>
                    
                    <hr style="border:0; border-top: 1px solid var(--border-color); margin: 1rem 0;">
                    
                    <div style="display: flex; justify-content: space-between; margin-bottom: 1.5rem;">
                        <span style="font-weight: 700; font-size: 1.1rem;">Tổng cộng:</span>
                        <span style="font-weight: 800; font-size: 1.2rem; color: var(--accent-green);" th:text="${#numbers.formatDecimal(cartTotal * 1.05, 0, 'COMMA', 0, 'POINT')} + 'đ'"></span>
                    </div>

                    <a th:href="@{/cart/checkout}" class="btn-primary" style="display: block; text-align: center; width: 100%;">Tiến Hành Đặt Mua</a>
                </div>
            </div>
        </div>
    </main>

    <footer th:replace="~{layout :: footer}"></footer>
</body>
</html>
