<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Wishlist')}"></head>
<body>
    <header th:replace="~{layout :: header}"></header>

    <main>
        <h2 style="font-weight: 800; font-size: 2.2rem; margin-bottom: 2rem;"><i class="fa-solid fa-star"></i> Danh Sách Ưu Thích (Wishlist)</h2>

        <div style="display: flex; gap: 1rem; margin-bottom: 1.5rem;">
            <a th:href="@{/collection}" class="btn-secondary">Bộ Sưu Tập</a>
            <a th:href="@{/collection/wishlist}" class="btn-primary">Wishlist của tôi</a>
        </div>

        <div class="glass-card">
            <div th:if="${wishlistItems.isEmpty()}" style="text-align: center; padding: 3rem 0; color: var(--text-secondary);">
                Bạn chưa thêm thẻ bài nào vào danh sách yêu thích.
            </div>

            <table th:if="${!wishlistItems.isEmpty()}">
                <thead>
                    <tr>
                        <th>Thẻ bài</th>
                        <th>Game</th>
                        <th>Rarity</th>
                        <th>Hành động</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="item : ${wishlistItems}">
                        <td>
                            <div style="display: flex; gap: 0.75rem; align-items: center;">
                                <img th:src="${item.card.imageUrl}" style="width: 35px; border-radius: 4px;">
                                <div>
                                    <a th:href="@{/cards/{id}(id=${item.card.id})}" style="font-weight: 600;" th:text="${item.card.name}"></a>
                                    <div style="font-size: 0.8rem; color: var(--text-secondary);" th:text="${item.card.cardSet.name}"></div>
                                </div>
                            </div>
                        </td>
                        <td th:text="${item.card.cardSet.game.name}"></td>
                        <td th:text="${item.card.rarity}"></td>
                        <td>
                            <a th:href="@{/cards/{id}(id=${item.card.id})}" class="btn-primary" style="padding: 0.25rem 0.75rem; font-size: 0.85rem;"><i class="fa-solid fa-search"></i> Check Giá</a>
                            
                            <form th:action="@{/collection/wishlist/remove}" method="post" style="display: inline-block; margin-left: 0.5rem;">
                                <input type="hidden" name="cardId" th:value="${item.card.id}">
                                <button type="submit" class="btn-secondary" style="padding: 0.25rem 0.5rem; color: var(--accent-red); border-color: rgba(239, 68, 68, 0.2);"><i class="fa-solid fa-trash"></i></button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <footer th:replace="~{layout :: footer}"></footer>
</body>
</html>
