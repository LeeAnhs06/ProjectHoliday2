<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Quản Lý Tài Khoản')}"></head>
<body>
    <header th:replace="~{layout :: header}"></header>

    <main>
        <div style="margin-bottom: 2rem;">
            <h2 style="font-weight: 800; font-size: 2.2rem; margin: 0;"><i class="fa-solid fa-user-gear"></i> Thiết Lập Tài Khoản</h2>
            <p style="color: var(--text-secondary); margin-top: 0.25rem;">Xem thông tin cá nhân, sửa thông tin chi tiết và cập nhật mật khẩu bảo mật.</p>
        </div>

        <div th:if="${successMessage}" class="glass-card" style="border-color: rgba(16,185,129,0.3); background: rgba(16,185,129,0.05); color: var(--accent-green); padding: 1rem; margin-bottom: 1.5rem;">
            <i class="fa-solid fa-check-circle"></i> <span th:text="${successMessage}"></span>
        </div>
        <div th:if="${errorMessage}" class="glass-card" style="border-color: rgba(239,68,68,0.3); background: rgba(239,68,68,0.05); color: var(--accent-red); padding: 1rem; margin-bottom: 1.5rem;">
            <i class="fa-solid fa-exclamation-triangle"></i> <span th:text="${errorMessage}"></span>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 2rem; align-items: start;">
            <!-- Left Panel: User Profile Summary -->
            <div class="glass-card" style="text-align: center; padding: 2rem 1.5rem;">
                <div style="position: relative; display: inline-block; margin-bottom: 1.5rem;">
                    <img th:src="${user.avatarUrl != null && !user.avatarUrl.isEmpty() ? user.avatarUrl : 'https://www.gravatar.com/avatar/00000000000000000000000000000000?d=mp&f=y'}" 
                         alt="Avatar" 
                         style="width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 4px solid var(--accent-blue); box-shadow: 0 4px 15px rgba(0,0,0,0.4);">
                </div>
                
                <h3 style="font-size: 1.4rem; font-weight: 700; margin: 0 0 0.25rem 0;" th:text="${user.displayName}"></h3>
                <div style="font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 1rem;" th:text="${user.email}"></div>
                
                <div style="display: inline-block; padding: 0.25rem 1rem; border-radius: 20px; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; margin-bottom: 1.5rem;" 
                     th:classappend="${user.role.name() == 'ADMIN' ? 'badge-yugioh' : (user.role.name() == 'SELLER' ? 'badge-pokemon' : 'badge')}"
                     th:styleappend="${user.role.name() == 'MEMBER' ? 'background: rgba(255,255,255,0.1); color: var(--text-primary);' : ''}"
                     th:text="${user.role.name()}">
                </div>

                <div style="border-top: 1px solid rgba(255,255,255,0.05); padding-top: 1.5rem; text-align: left;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 0.75rem;">
                        <span style="color: var(--text-secondary); font-size: 0.9rem;">Số dư tài khoản:</span>
                        <strong style="color: var(--accent-green); font-size: 1.1rem;" th:text="${#numbers.formatDecimal(user.balance, 0, 'COMMA', 0, 'POINT')} + 'đ'"></strong>
                    </div>
                    <div style="display: flex; justify-content: space-between; margin-bottom: 0.75rem;">
                        <span style="color: var(--text-secondary); font-size: 0.9rem;">Trạng thái ví:</span>
                        <span style="color: var(--accent-green); font-weight: 700; font-size: 0.9rem;"><i class="fa-solid fa-circle-check"></i> Hoạt động</span>
                    </div>
                </div>
            </div>

            <!-- Right Panel: Settings Forms -->
            <div style="display: flex; flex-direction: column; gap: 2rem;">
                
                <!-- Section 1: Update Profile Details -->
                <div class="glass-card">
                    <h3 style="font-size: 1.25rem; font-weight: 700; margin-top: 0; margin-bottom: 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 0.75rem; color: var(--accent-blue);"><i class="fa-solid fa-user-pen"></i> Cập Nhật Thông Tin Cá Nhân</h3>
                    
                    <form th:action="@{/profile/update}" method="post">
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1.25rem;">
                            <div>
                                <label class="form-label">Tên hiển thị</label>
                                <input type="text" name="displayName" th:value="${user.displayName}" class="form-control" required style="padding: 0.6rem;">
                            </div>
                            <div>
                                <label class="form-label">Số điện thoại</label>
                                <input type="text" name="phone" th:value="${user.phone}" class="form-control" placeholder="Chưa cập nhật" style="padding: 0.6rem;">
                            </div>
                        </div>

                        <div style="margin-bottom: 1.25rem;">
                            <label class="form-label">Địa chỉ nhận hàng / giao dịch</label>
                            <input type="text" name="address" th:value="${user.address}" class="form-control" placeholder="Địa chỉ giao hàng mặc định" style="padding: 0.6rem;">
                        </div>

                        <div style="margin-bottom: 1.5rem;">
                            <label class="form-label">Đường dẫn ảnh đại diện (Avatar URL)</label>
                            <input type="text" name="avatarUrl" th:value="${user.avatarUrl}" class="form-control" placeholder="https://..." style="padding: 0.6rem;">
                        </div>

                        <div style="display: flex; justify-content: flex-end;">
                            <button type="submit" class="btn-primary" style="padding: 0.75rem 2.5rem;"><i class="fa-solid fa-save"></i> Lưu Thay Đổi</button>
                        </div>
                    </form>
                </div>

                <!-- Section 2: Change Password -->
                <div class="glass-card">
                    <h3 style="font-size: 1.25rem; font-weight: 700; margin-top: 0; margin-bottom: 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 0.75rem; color: var(--accent-orange);"><i class="fa-solid fa-key"></i> Đổi Mật Khẩu Bảo Mật</h3>
                    
                    <form th:action="@{/profile/change-password}" method="post">
                        <div style="margin-bottom: 1.25rem;">
                            <label class="form-label">Mật khẩu hiện tại</label>
                            <input type="password" name="oldPassword" class="form-control" required placeholder="Nhập mật khẩu đang sử dụng" style="padding: 0.6rem;">
                        </div>

                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem;">
                            <div>
                                <label class="form-label">Mật khẩu mới</label>
                                <input type="password" name="newPassword" class="form-control" required minlength="6" placeholder="Tối thiểu 6 ký tự" style="padding: 0.6rem;">
                            </div>
                            <div>
                                <label class="form-label">Xác nhận mật khẩu mới</label>
                                <input type="password" name="confirmPassword" class="form-control" required minlength="6" placeholder="Nhập lại mật khẩu mới" style="padding: 0.6rem;">
                            </div>
                        </div>

                        <!-- OTP Section -->
                        <div style="margin-bottom: 1.5rem;">
                            <label class="form-label">Mã xác nhận OTP (gửi qua Gmail)</label>
                            <div style="display: flex; gap: 1rem; align-items: center;">
                                <input type="text" name="otp" class="form-control" required placeholder="Nhập mã 6 chữ số" style="padding: 0.6rem; flex: 1;">
                                <button type="button" id="btnRequestOtp" onclick="requestPasswordOtp()" class="btn-secondary" style="padding: 0.6rem 1.5rem; white-space: nowrap; border-color: rgba(255,255,255,0.15);">
                                    <i class="fa-solid fa-paper-plane"></i> Gửi Mã OTP
                                </button>
                            </div>
                            <div id="otpStatusMsg" style="font-size: 0.85rem; margin-top: 0.25rem; display: none;"></div>
                        </div>

                        <div style="display: flex; justify-content: flex-end;">
                            <button type="submit" class="btn-primary" style="background: var(--accent-orange); box-shadow: 0 4px 15px rgba(249,115,22,0.2); padding: 0.75rem 2.5rem;"><i class="fa-solid fa-lock"></i> Đổi Mật Khẩu</button>
                        </div>
                    </form>
                </div>

            </div>
        </div>
    </main>

    <footer th:replace="~{layout :: footer}"></footer>

    <script>
        function requestPasswordOtp() {
            const btn = document.getElementById('btnRequestOtp');
            const statusMsg = document.getElementById('otpStatusMsg');
            
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Đang gửi...';
            statusMsg.style.display = 'block';
            statusMsg.style.color = 'var(--text-secondary)';
            statusMsg.innerText = 'Hệ thống đang sinh mã OTP và kết nối gửi mail...';

            fetch('/profile/send-otp', {
                method: 'POST'
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    statusMsg.style.color = 'var(--accent-green)';
                    statusMsg.innerText = data.message;
                    
                    // Countdown timer for re-sending (60 seconds)
                    let seconds = 60;
                    const interval = setInterval(() => {
                        seconds--;
                        if (seconds <= 0) {
                            clearInterval(interval);
                            btn.disabled = false;
                            btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Gửi Lại Mã';
                        } else {
                            btn.innerHTML = `<i class="fa-solid fa-clock"></i> Gửi lại sau (${seconds}s)`;
                        }
                    }, 1000);
                } else {
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Gửi Mã OTP';
                    statusMsg.style.color = 'var(--accent-red)';
                    statusMsg.innerText = 'Lỗi: ' + data.message;
                }
            })
            .catch(err => {
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Gửi Mã OTP';
                statusMsg.style.color = 'var(--accent-red)';
                statusMsg.innerText = 'Có lỗi mạng xảy ra khi gửi yêu cầu.';
                console.error(err);
            });
        }
    </script>
</body>
</html>
