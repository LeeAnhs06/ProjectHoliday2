<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Đơn Hàng')}"></head>
<body>
    <header th:replace="~{layout :: header}"></header>

    <main>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <h2 style="font-weight: 800; font-size: 2.2rem;"><i class="fa-solid fa-receipt"></i> Đơn Hàng Của Bạn</h2>
            
            <form th:action="@{/orders/add-balance}" method="post" class="glass-card" style="padding: 0.5rem 1rem; display: flex; gap: 0.5rem; align-items: center;">
                <span style="font-size: 0.9rem; color: var(--text-secondary);">Nạp số dư giả lập:</span>
                <input type="number" name="amount" value="500000" step="100000" class="form-control" style="width: 120px; padding: 0.25rem 0.5rem;">
                <button type="submit" class="btn-primary" style="padding: 0.25rem 0.75rem; font-size:0.85rem;"><i class="fa-solid fa-plus"></i></button>
            </form>
        </div>

        <!-- Tab 1: Đơn Mua (Buyer Orders) -->
        <div class="glass-card" style="margin-bottom: 2rem;">
            <h3 style="font-size: 1.25rem; font-weight: 700; margin-bottom: 1rem;"><i class="fa-solid fa-bag-shopping"></i> Lịch sử đơn đặt mua</h3>
            <div th:if="${buyerOrders.isEmpty()}" style="color: var(--text-secondary); padding: 1rem 0;">
                Bạn chưa đặt mua đơn hàng nào.
            </div>
            <table th:if="${!buyerOrders.isEmpty()}">
                <thead>
                    <tr>
                        <th>Mã đơn</th>
                        <th>Người bán</th>
                        <th>Thời gian</th>
                        <th>Tổng tiền</th>
                        <th>Trạng thái</th>
                        <th>Chi tiết</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="o : ${buyerOrders}">
                        <td style="font-family: monospace; font-weight: 600;" th:text="${o.orderCode}"></td>
                        <td th:text="${o.seller.displayName}"></td>
                        <td th:text="${#temporals.format(o.createdAt, 'dd-MM-yyyy HH:mm')}"></td>
                        <td style="font-weight: 700; color: var(--accent-green);" th:text="${#numbers.formatDecimal(o.totalAmount, 0, 'COMMA', 0, 'POINT')} + 'đ'"></td>
                        <td>
                            <span class="badge" th:classappend="${o.status.name() == 'COMPLETED' ? 'badge-mint' : (o.status.name() == 'CANCELLED' ? 'badge-damaged' : 'badge-nearmint')}" th:text="${o.status}"></span>
                        </td>
                        <td>
                            <a th:href="@{/orders/{id}(id=${o.id})}" class="btn-secondary" style="padding: 0.25rem 0.75rem; font-size: 0.85rem;">Xem</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Tab 2: Đơn Bán (Seller Orders - if user is seller) -->
        <div th:if="${sellerOrders != null}" class="glass-card">
            <h3 style="font-size: 1.25rem; font-weight: 700; margin-bottom: 1rem;"><i class="fa-solid fa-store"></i> Đơn hàng khách mua của bạn</h3>
            <div th:if="${sellerOrders.isEmpty()}" style="color: var(--text-secondary); padding: 1rem 0;">
                Chưa có khách đặt mua hàng của bạn.
            </div>
            <table th:if="${!sellerOrders.isEmpty()}">
                <thead>
                    <tr>
                        <th>Mã đơn</th>
                        <th>Người mua</th>
                        <th>Thời gian</th>
                        <th>Thành tiền (Net)</th>
                        <th>Trạng thái</th>
                        <th>Chi tiết</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="o : ${sellerOrders}">
                        <td style="font-family: monospace; font-weight: 600;" th:text="${o.orderCode}"></td>
                        <td th:text="${o.buyer.displayName}"></td>
                        <td th:text="${#temporals.format(o.createdAt, 'dd-MM-yyyy HH:mm')}"></td>
                        <td style="font-weight: 700; color: var(--accent-green);" th:text="${#numbers.formatDecimal(o.totalAmount - o.platformFee, 0, 'COMMA', 0, 'POINT')} + 'đ'"></td>
                        <td>
                            <span class="badge" th:classappend="${o.status.name() == 'COMPLETED' ? 'badge-mint' : (o.status.name() == 'CANCELLED' ? 'badge-damaged' : 'badge-nearmint')}" th:text="${o.status}"></span>
                        </td>
                        <td>
                            <a th:href="@{/orders/{id}(id=${o.id})}" class="btn-secondary" style="padding: 0.25rem 0.75rem; font-size: 0.85rem;">Xử lý</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <footer th:replace="~{layout :: footer}"></footer>
</body>
</html>
