<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Đăng Nhập')}"></head>
<body style="display: flex; flex-direction: column; min-height: 100vh;">
    <header th:replace="~{layout :: header}"></header>

    <main style="display: flex; align-items: center; justify-content: center; flex-grow: 1; margin: 0 auto; width: 100%;">
        <div class="glass-card" style="width: 100%; max-width: 400px; padding: 2.5rem;">
            <h2 style="font-weight: 800; font-size: 1.8rem; text-align: center; margin-bottom: 1.5rem;">Đăng Nhập</h2>
            
            <div th:if="${param.error}" style="background: rgba(239, 68, 68, 0.1); border: 1px solid var(--accent-red); color: var(--accent-red); padding: 0.75rem; border-radius: 8px; margin-bottom: 1rem; font-size: 0.9rem;">
                Sai tài khoản hoặc mật khẩu. Vui lòng thử lại.
            </div>
            
            <div th:if="${param.registered}" style="background: rgba(16, 185, 129, 0.1); border: 1px solid var(--accent-green); color: var(--accent-green); padding: 0.75rem; border-radius: 8px; margin-bottom: 1rem; font-size: 0.9rem;">
                Đăng ký thành công! Hãy đăng nhập.
            </div>

            <form th:action="@{/login}" method="post">
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control" placeholder="example@tcg.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Mật khẩu</label>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-primary" style="width: 100%; margin-top: 1rem; padding: 0.75rem;">Đăng Nhập</button>
            </form>
            
            <div style="display: flex; align-items: center; justify-content: center; gap: 0.5rem; margin: 1.25rem 0; color: var(--text-secondary); font-size: 0.85rem;">
                <div style="flex: 1; height: 1px; background: rgba(255,255,255,0.05);"></div>
                <span>HOẶC</span>
                <div style="flex: 1; height: 1px; background: rgba(255,255,255,0.05);"></div>
            </div>

            <a th:href="@{/oauth2/authorization/google}" class="btn-secondary" style="display: flex; align-items: center; justify-content: center; gap: 0.75rem; width: 100%; padding: 0.75rem; border-color: rgba(255,255,255,0.15); text-decoration: none; color: var(--text-primary); font-weight: 600;">
                <svg viewBox="0 0 24 24" width="18" height="18" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" fill="#EA4335"/>
                </svg>
                Đăng nhập bằng Google
            </a>
            
            <p style="color: var(--text-secondary); text-align: center; font-size: 0.9rem; margin-top: 1.5rem;">
                Chưa có tài khoản? <a th:href="@{/register}" style="color: var(--accent-blue); font-weight: 600;">Đăng ký ngay</a>
            </p>
        </div>
    </main>

    <footer th:replace="~{layout :: footer}"></footer>
</body>
</html>
