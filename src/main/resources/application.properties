spring.application.name=ProjectTCG

# Database Configuration (Active: H2 File-based for persistence across restarts)
spring.datasource.url=jdbc:h2:file:./tcgdb;AUTO_SERVER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# To use MySQL, comment out the H2 lines above and uncomment the lines below:
# spring.datasource.url=jdbc:mysql://localhost:3306/tcgdb?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
# spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
# spring.datasource.username=root
# spring.datasource.password=Leanh123
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# H2 Console Configuration
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# JPA/Hibernate Config
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# File upload configuration
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Disable Tomcat session persistence on restart (prevent auto restoring sessions)
server.servlet.session.persistent=false

# Spring Mail / SMTP Settings (Configure with your Gmail details if sending actual emails)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Google OAuth2 Client Configuration (Replace with actual Client ID and Secret if using real OAuth)
spring.security.oauth2.client.registration.google.client-id=YOUR_GOOGLE_CLIENT_ID
spring.security.oauth2.client.registration.google.client-secret=YOUR_GOOGLE_CLIENT_SECRET
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.provider.google.user-name-attribute=email

# Pokémon TCG API Key (Get a free developer key from https://pokemontcg.io to bypass 504 gateway timeouts)
spring.pokemontcg.api-key=

# Cloudinary configurations (Get free credentials from https://cloudinary.com)
spring.cloudinary.cloud-name=YOUR_CLOUDINARY_CLOUD_NAME
spring.cloudinary.api-key=YOUR_CLOUDINARY_API_KEY
spring.cloudinary.api-secret=YOUR_CLOUDINARY_API_SECRET

# Google Gemini AI Chatbot Configuration (Get free key from https://aistudio.google.com)
spring.gemini.api-key=

# NVIDIA AI Chatbot Configuration (Get free key from https://build.nvidia.com)
spring.nvidia.api-key=YOUR_NVIDIA_NIM_API_KEY
